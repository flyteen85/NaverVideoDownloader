<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="glass header">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v10" /><path d="M7 9l5 5 5-5" /><path d="M4 19h16" />
      </svg>
    </div>
    <div class="header-text">
      <h1>네이버 동영상 다운로더<span class="ver-badge" id="ver-badge"></span></h1>
      <p id="status-line">영상을 찾는 중…</p>
    </div>
    <button id="rescan" class="icon-btn" title="다시 검색">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v6h-6" />
      </svg>
    </button>
    <button id="close" class="icon-btn" title="닫기">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  <a id="update-banner" class="update-banner hidden" href="#" target="_blank" rel="noopener noreferrer">
    <span class="ub-sheen"></span>
    <span class="ub-icon">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l2.1 4.9L19 10l-4.9 2.1L12 17l-2.1-4.9L5 10l4.9-2.1z" />
        <path d="M18.5 15.5l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9z" opacity="0.85" />
      </svg>
    </span>
    <span class="ub-body">
      <span class="ub-title">새 버전이 나왔어요</span>
      <span class="ub-sub"><b id="ub-ver"></b> · 클릭해서 업데이트</span>
    </span>
    <span class="ub-cta">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4v11" /><path d="M7 10l5 5 5-5" /><path d="M5 20h14" />
      </svg>
    </span>
  </a>

  <main id="list"></main>

  <div id="empty" class="glass empty hidden">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="3" /><path d="M10 9.5l5 2.5-5 2.5z" fill="currentColor" stroke="none" />
      </svg>
    </div>
    <h2>아직 발견된 영상이 없어요</h2>
    <p>네이버 블로그·카페 글에 들어가면<br />자동으로 영상을 감지합니다.<br />감지되지 않으면 영상을 한 번 재생해 보세요.</p>
  </div>

  <footer>
    <span id="footer-note">페이지 진입 시 자동 감지 · 패널을 열어둔 채로 탐색하세요</span>
  </footer>

  <div id="toast" class="toast"></div>

  <template id="card-tpl">
    <section class="glass card">
      <div class="thumb-wrap">
        <img class="thumb" alt="" />
        <div class="thumb-fallback">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M8 5.5v13l11-6.5z" /></svg>
        </div>
        <span class="duration"></span>
      </div>
      <div class="card-body">
        <h3 class="title"></h3>
        <div class="quality-row"></div>
        <div class="meta-row">
          <span class="size"></span>
          <button class="download-btn" title="다운로드">
            <svg class="ic-down" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4v11" /><path d="M7 10l5 5 5-5" /><path d="M5 20h14" />
            </svg>
            <svg class="ic-check hidden" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12.5l5 5L20 7" />
            </svg>
            <span class="spinner hidden"></span>
          </button>
        </div>
      </div>
    </section>
  </template>

  <script src="popup.js"></script>
</body>
</html>
